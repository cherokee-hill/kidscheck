<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidsCheck · Preschool</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Nunito', sans-serif; background: #fef9ee; height: 100vh; display: flex; flex-direction: column; position: relative; }

  .bg-bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .bubble { position: absolute; border-radius: 50%; opacity: 0.07; animation: float linear infinite; }
  @keyframes float { 0%{transform:translateY(110vh) scale(0.8);opacity:0} 10%{opacity:0.07} 90%{opacity:0.07} 100%{transform:translateY(-20vh) scale(1.1);opacity:0} }

  .header { background: linear-gradient(135deg,#f59e0b,#fbbf24); padding:16px 28px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 6px 24px rgba(245,158,11,.35); position:relative; z-index:10; flex-shrink:0; }
  .header h1 { font-family:'Fredoka One',sans-serif; font-size:2.2rem; color:white; text-shadow:0 3px 10px rgba(120,53,15,.25); line-height:1; }
  .header p { color:rgba(255,255,255,.85); font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; margin-top:3px; }
  #clock { font-family:'Fredoka One',sans-serif; font-size:2.4rem; color:white; text-align:right; }
  #dateline { font-size:.78rem; font-weight:700; color:rgba(255,255,255,.8); text-align:right; margin-top:2px; }

  .stage { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 32px; position:relative; z-index:5; }

  .idle { text-align:center; animation:breathe 4s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.04);opacity:1} }
  .idle-emoji { font-size:6rem; display:block; margin-bottom:16px; }
  .idle h2 { font-family:'Fredoka One',sans-serif; font-size:2.8rem; color:#d97706; }
  .idle p { font-size:1rem; color:#a16207; font-weight:700; margin-top:6px; }

  .name-card { background:white; border-radius:32px; padding:52px 72px; text-align:center; box-shadow:0 0 0 8px rgba(245,158,11,.15),0 24px 80px rgba(245,158,11,.22),0 8px 32px rgba(0,0,0,.08); border:5px solid #fde68a; max-width:760px; width:100%; position:relative; overflow:hidden; animation:popIn .55s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes popIn { 0%{opacity:0;transform:scale(.7) rotate(-2deg)} 100%{opacity:1;transform:scale(1) rotate(0)} }
  .name-card::before { content:''; position:absolute; top:0; left:0; right:0; height:10px; background:repeating-linear-gradient(90deg,#f59e0b 0,#f59e0b 20px,#22c55e 20px,#22c55e 40px,#0ea5e9 40px,#0ea5e9 60px,#f43f5e 60px,#f43f5e 80px); }
  .card-sun { font-size:3.5rem; margin-bottom:12px; animation:spinOnce .6s ease .2s both; display:block; }
  @keyframes spinOnce { from{transform:rotate(-30deg) scale(.5);opacity:0} to{transform:rotate(0) scale(1);opacity:1} }
  .now-label { font-size:.8rem; font-weight:800; text-transform:uppercase; letter-spacing:2.5px; color:#f59e0b; margin-bottom:10px; }
  .big-name { font-family:'Fredoka One',sans-serif; font-size:5.5rem; color:#1c0a00; line-height:1; letter-spacing:1px; margin-bottom:18px; animation:nameSlide .5s cubic-bezier(.34,1.56,.64,1) .15s both; }
  @keyframes nameSlide { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .location-tag { display:inline-flex; align-items:center; gap:7px; background:#fef3c7; border:3px solid #fde68a; color:#92400e; padding:8px 26px; border-radius:40px; font-size:1.15rem; font-weight:800; margin-bottom:20px; }
  .pickup-msg { font-size:1.1rem; color:#6b7280; font-weight:700; margin-bottom:24px; }
  .timer-track { background:#f3f4f6; border-radius:40px; height:10px; overflow:hidden; width:100%; max-width:400px; margin:0 auto; }
  .timer-fill { height:100%; border-radius:40px; background:linear-gradient(90deg,#f59e0b,#22c55e); transition:width 1s linear; }

  .queue-bar { background:white; border-top:3px solid #fde68a; padding:14px 28px; position:relative; z-index:10; flex-shrink:0; }
  .queue-label { font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:#9ca3af; margin-bottom:8px; }
  .queue-chips { display:flex; gap:8px; flex-wrap:wrap; }
  .chip { background:#fffbeb; border:2px solid #fde68a; border-radius:20px; padding:4px 14px; font-weight:800; font-size:.82rem; color:#92400e; animation:chipIn .3s ease; }
  @keyframes chipIn { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }
  .none-yet { font-size:.82rem; color:#d1d5db; font-weight:600; }

  .gear-btn { position:fixed; bottom:70px; right:14px; background:rgba(0,0,0,.08); border:none; border-radius:50%; width:36px; height:36px; font-size:1rem; cursor:pointer; z-index:50; color:rgba(0,0,0,.3); display:flex; align-items:center; justify-content:center; }

  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(4px); }
  .overlay-box { background:white; border-radius:22px; padding:32px; max-width:440px; width:90%; box-shadow:0 32px 80px rgba(0,0,0,.2); }
  .overlay-box h2 { font-family:'Fredoka One',sans-serif; font-size:1.6rem; color:#f59e0b; margin-bottom:4px; }
  .overlay-box p { font-size:.85rem; color:#6b7280; margin-bottom:22px; }
  .o-field { margin-bottom:13px; }
  .o-field label { display:block; font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:#6b7280; margin-bottom:4px; }
  .o-field input { width:100%; padding:10px 13px; border:2px solid #e5e7eb; border-radius:10px; font-family:'Nunito',sans-serif; font-size:.9rem; }
  .o-field input:focus { outline:none; border-color:#f59e0b; }
  .btn-connect { width:100%; background:linear-gradient(135deg,#f59e0b,#fbbf24); color:white; border:none; padding:13px; border-radius:12px; font-family:'Fredoka One',sans-serif; font-size:1.1rem; cursor:pointer; box-shadow:0 4px 16px rgba(245,158,11,.4); margin-top:4px; letter-spacing:.5px; }
</style>
</head>
<body>
<div class="bg-bubbles" id="bubbles"></div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <h2>🌻 Preschool Display</h2>
    <p>Connect to your Supabase database to start showing checkout announcements.</p>
    <div class="o-field"><label>Supabase URL</label><input type="text" id="cfgUrl" placeholder="https://xxxx.supabase.co"></div>
    <div class="o-field"><label>Supabase Anon Key</label><input type="password" id="cfgKey" placeholder="anon key"></div>
    <button class="btn-connect" onclick="connect()">✨ Connect!</button>
  </div>
</div>

<div class="header">
  <div><h1>🌻 Preschool Pickup</h1><p>Family Checkout Station</p></div>
  <div><div id="clock">--:--</div><div id="dateline">—</div></div>
</div>

<div class="stage" id="stage">
  <div class="idle"><span class="idle-emoji">🌈</span><h2>Ready for Pickup!</h2><p>Names appear here when checked out</p></div>
</div>

<div class="queue-bar">
  <div class="queue-label">⏱ Recent Checkouts</div>
  <div class="queue-chips" id="chips"><span class="none-yet">None yet</span></div>
</div>

<button class="gear-btn" onclick="document.getElementById('overlay').style.display='flex'">⚙️</button>

<script>
(function(){
  const colors=['#f59e0b','#22c55e','#0ea5e9','#f43f5e','#8b5cf6'];
  const wrap=document.getElementById('bubbles');
  for(let i=0;i<14;i++){
    const b=document.createElement('div'); b.className='bubble';
    const s=40+Math.random()*120;
    b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${colors[i%colors.length]};animation-duration:${12+Math.random()*18}s;animation-delay:${Math.random()*-20}s;`;
    wrap.appendChild(b);
  }
})();

function tick(){
  const n=new Date(),h=n.getHours()%12||12,m=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent=`${h}:${m} ${n.getHours()>=12?'PM':'AM'}`;
  document.getElementById('dateline').textContent=n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
tick(); setInterval(tick,1000);

let CFG={url:'',key:''}, lastId=null, recentNames=[], activeTimer=null;

function connect(){
  CFG.url=document.getElementById('cfgUrl').value.trim().replace(/\/$/,'');
  CFG.key=document.getElementById('cfgKey').value.trim();
  if(!CFG.url||!CFG.key) return;
  localStorage.setItem('kc_ps_cfg',JSON.stringify(CFG));
  document.getElementById('overlay').style.display='none';
  startPolling();
}

function loadConfig(){
  const s=localStorage.getItem('kc_ps_cfg');
  if(s){ CFG=JSON.parse(s); document.getElementById('cfgUrl').value=CFG.url; document.getElementById('cfgKey').value=CFG.key; if(CFG.url&&CFG.key){document.getElementById('overlay').style.display='none'; startPolling();} }
}

function startPolling(){ poll(); setInterval(poll,2000); }

async function poll(){
  if(!CFG.url||!CFG.key) return;
  try{
    const now=new Date().toISOString();
    let rows=[];
    const r=await fetch(`${CFG.url}/rest/v1/checkouts?select=*&location_type=eq.preschool&expires_at=gte.${encodeURIComponent(now)}&order=id.desc&limit=1`,{headers:{'apikey':CFG.key,'Authorization':`Bearer ${CFG.key}`}});
    if(r.ok){ rows=await r.json(); }
    else {
      const r2=await fetch(`${CFG.url}/rest/v1/checkouts?select=*&expires_at=gte.${encodeURIComponent(now)}&order=id.desc&limit=10`,{headers:{'apikey':CFG.key,'Authorization':`Bearer ${CFG.key}`}});
      if(r2.ok){ const all=await r2.json(); rows=all.filter(x=>{const l=(x.location_type||x.location||'').toLowerCase(); return l.includes('preschool')||l.includes('pre-k')||l.includes('prek');}); }
    }
    if(rows.length>0) handleRow(rows[0]);
  }catch(e){}
}

function handleRow(row){
  if(!row||!row.id) return;
  if(String(row.id)===String(lastId)) return;
  lastId=String(row.id);
  showName(row.child_name,row.location);
  speak(row.child_name,row.location);
  addChip(row.child_name);
}

function showName(name,location){
  document.getElementById('stage').innerHTML=`
    <div class="name-card">
      <span class="card-sun">☀️</span>
      <div class="now-label">Now Checking Out</div>
      <div class="big-name">${name}</div>
      <div class="location-tag">📍 ${location}</div>
      <div class="pickup-msg">Your family is waiting for you! 🎉</div>
      <div class="timer-track"><div class="timer-fill" id="tf"></div></div>
    </div>`;
  clearInterval(activeTimer);
  let s=60; const f=document.getElementById('tf'); if(f) f.style.width='100%';
  activeTimer=setInterval(()=>{ s--; if(f) f.style.width=`${(s/60)*100}%`; if(s<=0){clearInterval(activeTimer);resetIdle();} },1000);
}

function resetIdle(){
  document.getElementById('stage').innerHTML=`<div class="idle"><span class="idle-emoji">🌈</span><h2>Ready for Pickup!</h2><p>Names appear here when checked out</p></div>`;
}

function addChip(name){
  recentNames.unshift(name); if(recentNames.length>7) recentNames.pop();
  document.getElementById('chips').innerHTML=recentNames.map((n,i)=>`<div class="chip">${i===0?'✅':'⏱'} ${n}</div>`).join('');
}

function speak(name,location){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const msg = `Attention ${name}, your adult is here for pickup. ${name}, grab your things and head to the double doors.`;
  const u = new SpeechSynthesisUtterance(msg);
  u.rate = 0.88; u.pitch = 1.0; u.volume = 1;
  const v = window.speechSynthesis.getVoices().find(v => /Samantha|Karen|Victoria|Google US English/i.test(v.name));
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);}
window.speechSynthesis?.getVoices?.();
window.speechSynthesis?.addEventListener?.('voiceschanged',()=>window.speechSynthesis.getVoices());
if('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
loadConfig();
</script>
</body>
</html>
